<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Little Fort Studios</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #333;
            line-height: 1.7;
            background: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 40px 24px;
            max-width: 560px;
        }
        h1 {
            font-size: 44px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }
        .creators {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 36px;
        }
        .creators-text {
            font-size: 16px;
            color: #888;
        }
        .creators-logo {
            height: 22px;
            width: auto;
            display: block;
        }
        .about {
            font-size: 15px;
            line-height: 1.65;
            color: #555;
            margin-bottom: 40px;
            text-align: center;
            padding: 0 8px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

            color: #5b6abf;
            text-decoration: none;
            font-size: 16px;
            padding: 12px 32px;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
