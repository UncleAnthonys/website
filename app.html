<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Little Lines | Little Fort Studios</title>
    <meta name="description" content="Turn your favourite memories into wonderful colouring pages, or make your child the star of their own personalised storybook. Download Little Lines on the App Store and Google Play.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #333;
            line-height: 1.7;
            background: #fafafa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }
        .card {
            max-width: 480px;
            width: 100%;
            background: #fff;
            border: 1px solid #ececec;
            border-radius: 24px;
            padding: 44px 32px 48px;
            text-align: center;
            box-shadow: 0 8px 40px rgba(0,0,0,0.04);
        }
        .logo {
            width: 200px;
            max-width: 70%;
            height: auto;
            margin: 0 auto 28px;
            display: block;
        }
        .blurb {
            font-size: 16px;
            color: #555;
            margin: 0 auto 32px;
            max-width: 380px;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-width: 320px;
            margin: 0 auto;
        }
        .store-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 24px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.12s ease, box-shadow 0.12s ease;
        }
        .store-btn:active { transform: scale(0.98); }
        .store-btn .icon { font-size: 24px; line-height: 1; }
        .store-btn .sub {
            display: block;
            font-size: 11px;
            font-weight: 400;
            opacity: 0.7;
            text-align: left;
            line-height: 1.2;
        }
        .store-btn .main {
            display: block;
            text-align: left;
            line-height: 1.2;
        }
        .apple { background: #1a1a1a; color: #fff; }
        .apple:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.18); }
        .google {
            background: #fff;
            color: #1a1a1a;
            border: 1.5px solid #e0e0e0;
        }
        .google:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
        .footer {
            text-align: center;
            padding: 24px;
            font-size: 13px;
            color: #aaa;
        }
        .footer a { color: #999; text-decoration: none; margin: 0 8px; }
        .footer a:hover { color: #ff6b9d; }
    </style>
</head>
